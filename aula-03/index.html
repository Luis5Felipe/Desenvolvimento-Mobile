<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pense Bem</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">

        class Dados{
            static programa = 0;
            static pergunta = 1;
            static tentativa = 1;
            static pontos = 0;
            static gabarito = new Array (5);

            static gabarito21 = new Array ('B', 'A', 'A', 'D', 'C');
            static gabarito22 = new Array ('B', 'B', 'A', 'B', 'A');
            static gabarito23 = new Array ('B', 'A', 'A', 'B', 'A');
        }


      const Titulo = function() {
        return(
          <img src="imagens/LogoTectoy.png" id="logo" />
        )
      }

      const Saida = function() {
        return(
          <>
            <p><input id="tela1" readonly value="*" /></p>
            <p><input id="tela2" readonly value="*" /></p>
          </>
        )
      }

      const Controle = function() {
        const jogar = (resposta) =>{
          document.getElementById('tela1').value = `Tentativa ${Dados.tentativa}: ${resposta}`;
          if (resposta === Dados.gabarito[Dados.pergunta - 1]) {
            Dados.pontos += 1;
            document.getElementById('tela2').value = `Resposta correta! Pontos: ${Dados.pontos}`;

              if(Dados.tentativa == 1){
                Dados.pontos += 3;
              }
              if(Dados.tentativa == 2){
                Dados.pontos += 2;
              }
              else
               Dadps.pontos++;

              Dados.pergunta++;
              Dados.tentativa = 1;
          } else {
            document.getElementById('tela2').value = 'Resposta incorreta!';

            Dados.tentativa++;
          }

        }
        return(
          <p>
            <input type="button" class="botao" id="botaoA" value="A" onClick={() => jogar('A')} />
            <input type="button" class="botao" id="botaoB" value="B" onClick={() => jogar('B')} />
            <input type="button" class="botao" id="botaoC" value="C" onClick={() => jogar('C')} />
            <input type="button" class="botao" id="botaoD" value="D" onClick={() => jogar('D')} />
          </p>
        )
      }

      const Start = function() {
        const iniciar = () => {
          Dados.programa = prompt('Digite o número do programa (21, 22 ou 23):', '');

          if (Dados.programa == 21) {
            Dados.gabarito = Dados.gabarito21;
          } else if (Dados.programa == 22) {
            Dados.gabarito = Dados.gabarito22;
          } else if (Dados.programa == 23) {
            Dados.gabarito = Dados.gabarito23;
          } else {
            alert('Programa inválido. Por favor, digite 21, 22 ou 23.');
            iniciar(); 
          }

          Dados.pergunta = 1;
          Dados.tentativa = 1;
          Dados.pontos = 0;

          document.getElementById('tela1').value = `${Dados.programa}->${Dados.pergunta}`;
        };

        return(
            <p>
                <input
                  type="button"
                  id="botaoStart"
                  className="botao"
                  value="Start/Reset"
                  onClick={iniciar}
                />
            </p>
        )
      }


      const App = function() {
        return(
          <div id="app">
            <Titulo />
            <Saida />
            <Controle />
            <Start />
          </div>
        )
      }

      ReactDOM.render(
        <App />,
        document.getElementById('root')
      )
    </script>
  </body>
</html>
